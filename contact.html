  <section class="max-w-2xl mx-auto px-6 pt-32 pb-24 fade-in">

    <h1 class="text-4xl md:text-5xl font-extrabold text-center mb-4">Get In Touch</h1>
    <p class="text-slate-400 text-center mb-10">
      Have a question or want to collaborate? Send me a message.
    </p>

    <!--
      FORM NOTE: This form uses a "mailto" action, which opens the
      visitor's own email app (Outlook, Gmail desktop app, Mail, etc)
      with the message pre-filled, instead of sending it directly
      from the website.

      This is the simplest option for a static GitHub Pages site with
      no backend, but it has one real limitation worth knowing:
      it ONLY works if the visitor has an email app installed and
      configured on their device. On many phones/browsers it does
      nothing visible if no mail app is set up - so for visitors
      browsing on mobile without a mail app, this form may appear
      "broken" even though the code is correct.

      If you want messages to send directly without relying on the
      visitor's own email app, Formspree (mentioned in earlier
      versions of this file) is the more reliable alternative for
      a static site - free for basic use, no backend needed either.
    -->
    <form action="mailto:st10514888@rcconnect.edu.za" method="post" enctype="text/plain" class="space-y-4">

      <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
        class="input-field"
      />

      <input
        type="email"
        name="email"
        placeholder="Your Email"
        required
        class="input-field"
      />

      <textarea
        name="message"
        rows="5"
        placeholder="Your Message"
        required
        class="input-field"
      ></textarea>

      <button type="submit" class="w-full btn-primary">
        Send Message
      </button>

    </form>

    <p class="text-center text-slate-500 mt-6 text-sm">
      Or email me directly at
      <a href="mailto:st10514888@rcconnect.edu.za" class="text-cyan-400 hover:underline">st10514888@rcconnect.edu.za</a>
    </p>

  </section>
